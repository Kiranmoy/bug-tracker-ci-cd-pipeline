name: CI

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  unit-tests-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Backend Tests
        working-directory: ./bugtracker-backend
        run: |
          ruff check --fix . && ruff format . && mypy .
          pytest --junitxml=pytest-results.xml \
          --html=unit-test-report.html \
          --self-contained-html

      - name: Publish Backend Test Results
        uses: dorny/test-reporter@v1
        if: always() # Use always() in the next step so reports publish even if tests fail
        with:
          name: Backend Unit Tests Report
          path: bugtracker-backend/pytest-results.xml
          reporter: python-xunit        # Format of test results

  
  unit-tests-frontend:
    needs: unit-tests-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Frontend Tests
        working-directory: ./bugtracker-frontend
        run: |
          ruff check --fix . && ruff format . && mypy .
          pytest --junitxml=pytest-results.xml \
          --html=unit-test-report.html \
          --self-contained-html

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # Use always() in the next step so reports publish even if tests fail
        with:
          name: Frontend Unit Tests Report
          files: bugtracker-frontend/pytest-results.xml